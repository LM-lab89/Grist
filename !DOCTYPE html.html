<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Grist Planning Widget</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    :root {
      --border-color: #e2e8f0;
      --header-bg: #f8fafc;
      --weekend-bg: #f1f5f9;
      /* Couleurs de ta capture */
      --color-TT: #FDFD96;       /* Jaune clair */
      --color-CA: #FFB3BA;       /* Rouge/Rose */
      --color-Formation: #BFFCC6;/* Vert */
      --color-RCT: #BAE1FF;      /* Bleu */
      --color-Permanence: #FFFF00;/* Jaune vif */
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background: white;
      color: #334155;
      font-size: 13px;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header-bar {
      padding: 10px 20px;
      background: #4f46e5;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .table-container {
      flex-grow: 1;
      overflow: auto;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      table-layout: fixed;
    }

    /* Colonne des noms figée à gauche */
    th:first-child, td:first-child {
      position: sticky;
      left: 0;
      z-index: 10;
      background: white;
      width: 180px;
      min-width: 180px;
      border-right: 2px solid var(--border-color);
      padding-left: 10px;
      text-align: left;
    }

    th {
      background: var(--header-bg);
      border: 1px solid var(--border-color);
      height: 50px;
      font-weight: 600;
    }

    td {
      border: 1px solid var(--border-color);
      height: 35px;
      text-align: center;
      position: relative;
    }

    .day-name { font-size: 10px; color: #64748b; display: block; }
    .day-num { font-size: 14px; display: block; }

    /* Style des Week-ends */
    .weekend { background-color: var(--weekend-bg); }

    /* Style des étiquettes (Badges) */
    .event-badge {
      position: absolute;
      top: 2px;
      bottom: 2px;
      left: 2px;
      right: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 11px;
      border-radius: 3px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
      cursor: pointer;
      overflow: hidden;
      white-space: nowrap;
    }

    /* Couleurs dynamiques basées sur le texte */
    .status-TT { background-color: var(--color-TT); color: #856404; }
    .status-CA { background-color: var(--color-CA); color: #721c24; }
    .status-FORMATION { background-color: var(--color-Formation); color: #155724; }
    .status-RCT { background-color: var(--color-RCT); color: #004085; }
    .status-PERMANENCE { background-color: var(--color-Permanence); color: #000; border: 1px solid #000; }
  </style>
</head>
<body>

<div id="app">
  <div class="header-bar" id="monthTitle">Chargement...</div>
  <div class="table-container">
    <table id="planningTable">
      <thead><tr id="headerRow"></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
  // Configuration du mois actuel (modifiable pour naviguer plus tard)
  const now = new Date();
  let currentMonth = now.getMonth(); 
  let currentYear = now.getFullYear();

  const daysLabels = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
  const monthsLabels = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];

  function getDaysInMonth(month, year) {
    return new Date(year, month + 1, 0).getDate();
  }

  function renderCalendarFramework() {
    const headerRow = document.getElementById('headerRow');
    const daysCount = getDaysInMonth(currentMonth, currentYear);
    
    document.getElementById('monthTitle').innerText = `${monthsLabels[currentMonth]} ${currentYear}`;
    
    let html = '<th>Collaborateurs</th>';
    for (let i = 1; i <= daysCount; i++) {
      const date = new Date(currentYear, currentMonth, i);
      const isWeekend = (date.getDay() === 0 || date.getDay() === 6);
      html += `<th class="${isWeekend ? 'weekend' : ''}">
                <span class="day-name">${daysLabels[date.getDay()].substring(0, 2)}</span>
                <span class="day-num">${i}/${currentMonth + 1}</span>
              </th>`;
    }
    headerRow.innerHTML = html;
  }

  // Initialisation Grist
  grist.ready({
    requiredAccess: 'readtable',
    columns: [
      { name: "Nom", title: "Nom du collaborateur" },
      { name: "Debut", title: "Date de début" },
      { name: "Fin", title: "Date de fin", optional: true },
      { name: "Statut", title: "Type (TT, CA, ...)" }
    ]
  });

  grist.onRecords((records) => {
    const tableBody = document.getElementById('tableBody');
    const daysCount = getDaysInMonth(currentMonth, currentYear);
    
    // 1. Grouper les données par personne
    const dataByPerson = {};
    records.forEach(r => {
      if (!dataByPerson[r.Nom]) dataByPerson[r.Nom] = [];
      dataByPerson[r.Nom].push(r);
    });

    // 2. Construire le tableau
    let bodyHtml = '';
    Object.keys(dataByPerson).sort().forEach(person => {
      bodyHtml += `<tr><td><strong>${person}</strong></td>`;
      
      for (let day = 1; day <= daysCount; day++) {
        const currentDate = new Date(currentYear, currentMonth, day).getTime();
        const isWeekend = new Date(currentYear, currentMonth, day).getDay() % 6 === 0;
        
        // Chercher si un événement correspond à ce jour
        const event = dataByPerson[person].find(e => {
          const start = new Date(e.Debut).setHours(0,0,0,0);
          const end = e.Fin ? new Date(e.Fin).setHours(23,59,59,999) : new Date(e.Debut).setHours(23,59,59,999);
          return currentDate >= start && currentDate <= end;
        });

        if (event) {
          const statusClass = `status-${event.Statut.toUpperCase().replace(/\s/g, '')}`;
          bodyHtml += `<td class="${isWeekend ? 'weekend' : ''}">
                        <div class="event-badge ${statusClass}" title="${event.Statut}">
                          ${event.Statut}
                        </div>
                      </td>`;
        } else {
          bodyHtml += `<td class="${isWeekend ? 'weekend' : ''}"></td>`;
        }
      }
      bodyHtml += '</tr>';
    });
    
    tableBody.innerHTML = bodyHtml;
  });

  renderCalendarFramework();
</script>

</body>
</html>
